name: Build RLMod

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  # Allow manual trigger from the Actions tab
  workflow_dispatch:

jobs:
  build:
    name: Build (Windows / MSVC)
    runs-on: windows-latest

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. CMake configure ───────────────────────────────────────────────────
      - name: Configure CMake
        run: cmake -B build -A x64 -DCMAKE_BUILD_TYPE=Release

      # ── 3. Build ─────────────────────────────────────────────────────────────
      - name: Build
        run: cmake --build build --config Release --parallel

      # ── 4. Collect artifacts ─────────────────────────────────────────────────
      - name: Gather build output
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist\plugins | Out-Null
          Copy-Item build\Release\RLMod.exe dist\
          # Copy all built plugin DLLs into the plugins folder
          Get-ChildItem build\Release\*.dll | Copy-Item -Destination dist\plugins\
          # Copy README for context
          Copy-Item README.md dist\

      # ── 5. Upload as a workflow artifact ────────────────────────────────────
      - name: Upload RLMod
        uses: actions/upload-artifact@v4
        with:
          name: RLMod-x64-Release
          path: dist/
          retention-days: 30

      # ── 6. Create a GitHub Release on version tags (e.g. v0.1.0) ────────────
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/**
          generate_release_notes: true
